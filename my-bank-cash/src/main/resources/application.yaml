server:
  port: 8083

keycloak:
  url: http://localhost:8180
  realm: my-bank-realm
  cash:
    secret: secret
consul:
  host: localhost
  port: 8500

spring:
  application:
    name: cash-service
  datasource:
    url: jdbc:postgresql://localhost:5432/my_bank_cash
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
      client:
        registration:
          cash-service:
            client-id: cash-service
            client-secret: ${keycloak.cash.secret}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
  cloud:
    consul:
      host: ${consul.host}
      port: ${consul.port}
      discovery:
        prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      notifications-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 1
      accounts-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 1
        ignore-exceptions:
          - com.github.dgaponov99.practicum.mybank.cash.exception.ExternalMultipleException