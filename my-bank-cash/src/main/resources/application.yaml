server:
  port: 8083

keycloak:
  url: http://localhost:8180
  realm: my-bank-realm
  cash:
    secret: secret

spring:
  application:
    name: cash-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:my_bank_cash}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
      client:
        registration:
          cash-service:
            client-id: cash-service
            client-secret: ${keycloak.cash.secret}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
  kafka:
    bootstrap-servers: localhost:9001
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

resilience4j:
  circuitbreaker:
    instances:
      accounts-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 1
        ignore-exceptions:
          - com.github.dgaponov99.practicum.mybank.cash.exception.ExternalMultipleException

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
