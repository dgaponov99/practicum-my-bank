server:
  port: 8083

keycloak:
  url: http://localhost:8180
  realm: my-bank-realm
  cash:
    secret: secret
consul:
  host: localhost
  port: 8500

spring:
  application:
    name: cash-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
      client:
        registration:
          cash-service:
            client-id: cash-service
            client-secret: ${keycloak.cash.secret}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
  cloud:
    consul:
      host: ${consul.host}
      port: ${consul.port}
      discovery:
        prefer-ip-address: true