vault:
  url: "http://host.docker.internal:8200"

external:
  services:
    keycloak:
      host: auth-local
    zipkin:
      host: zipkin
    logstash:
      host: logstash

tests:
  frontend-service:
    port: 80
    method: GET
    url: /account
    expectCode: 302
  accounts-service:
    port: 8082
    method: GET
    url: /
    expectCode: 401
  transfer-service:
    port: 8081
    method: GET
    url: /accounts
    expectCode: 401
  cash-service:
    port: 8083
    method: POST
    url: /withdraw
    expectCode: 401
