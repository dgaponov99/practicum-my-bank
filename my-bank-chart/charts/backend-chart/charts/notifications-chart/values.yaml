replicaCount: 1
image:
  repository: my-bank-notifications
  tag: "latest"
service:
  port: 8084
  type: ClusterIP

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8084
  initialDelaySeconds: 20
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8084
  initialDelaySeconds: 30
  periodSeconds: 10
startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8084
  failureThreshold: 60
  periodSeconds: 5