apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend-chart.name" . }}
  labels:
    {{ include "frontend-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{ include "frontend-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "frontend-chart.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: {{ .Values.keycloak.secret.property }}
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
            - name: GATEWAY_SERVICE_URL
              value: {{ .Values.gateway.service.url }}
            - name: ZIPKIN_HOST
              value: {{ .Values.zipkin.host }}
