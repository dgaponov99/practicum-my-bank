server:
  port: 8082

spring:
  application:
    name: my-bank-accounts
  datasource:
    url: jdbc:postgresql://localhost:5432/my_bank
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/my-bank-realm
      client:
        registration:
          accounts-service:
            client-id: accounts-service
            client-secret: GVoVJ9qmsJB2NUtQlk96xAclTdB7fjbv
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/my-bank-realm
