server:
  port: 8082

spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://localhost:5432/my_bank
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
      client:
        registration:
          accounts-service:
            client-id: accounts-service
            client-secret: ${KEYCLOAK_ACCOUNTS_SECRET}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
  cloud:
    consul:
      host: ${CONSUL_HOST}
      port: ${CONSUL_PORT}
      discovery:
        prefer-ip-address: true