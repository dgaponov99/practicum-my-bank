server:
  port: 8081

keycloak:
  url: http://localhost:8180
  realm: my-bank-realm
  transfer:
    secret: secret
consul:
  host: localhost
  port: 8500

spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/my_bank_transfer
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
      client:
        registration:
          transfer-service:
            client-id: transfer-service
            client-secret: ${keycloak.transfer.secret}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
  cloud:
    consul:
      host: ${consul.host}
      port: ${consul.port}
      discovery:
        prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      notifications-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 1
      accounts-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 1
        ignore-exceptions:
          - com.github.dgaponov99.practicum.mybank.transfer.exception.ExternalMultipleException