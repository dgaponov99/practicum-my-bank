server:
  port: 8081

keycloak:
  url: http://localhost:8180
  realm: my-bank-realm
  transfer:
    secret: secret

spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:my_bank_transfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realm}
      client:
        registration:
          transfer-service:
            client-id: transfer-service
            client-secret: ${keycloak.transfer.secret}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: ${keycloak.url}/realms/${keycloak.realm}

resilience4j:
  circuitbreaker:
    instances:
      notifications-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 1
      accounts-service:
        slidingWindowSize: 10
        failureRateThreshold: 3
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 1
        ignore-exceptions:
          - com.github.dgaponov99.practicum.mybank.transfer.exception.ExternalMultipleException

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
